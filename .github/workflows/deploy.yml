name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy via scp
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          SSH_OPTS="-i ~/.ssh/deploy_key"
          SSH_DEST="${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}"
          TARGET="${{ secrets.SSH_TARGET_PATH }}"
          ssh $SSH_OPTS "$SSH_DEST" "rm -rf '$TARGET'/* '$TARGET'/.[!.]* '$TARGET'/..?* 2>/dev/null; mkdir -p '$TARGET'"
          scp $SSH_OPTS -r dist/. "$SSH_DEST:$TARGET/"
